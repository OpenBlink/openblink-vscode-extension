name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build-wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 5.0.5

      - name: Verify Emscripten
        run: emcc --version

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Build mrbc WASM
        run: make mrbc

      - name: Verify mrbc WASM output
        run: |
          ls -la resources/wasm/mrbc.js
          ls -la resources/wasm/mrbc.wasm

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasm
          path: resources/wasm/

  build:
    needs: build-wasm
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: darwin-arm64
          - os: macos-15
            target: darwin-x64
            node_arch: x64
          - os: windows-latest
            target: win32-x64
          - os: ubuntu-latest
            target: linux-x64

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          architecture: ${{ matrix.node_arch || '' }}

      - name: Verify version consistency
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi
          echo "Version: $TAG_VERSION"

      - name: Install dependencies
        run: npm ci

      - name: Verify native binding
        if: runner.os != 'Linux'
        shell: bash
        run: |
          echo "Noble native binding:"
          ls -la node_modules/@abandonware/noble/build/Release/binding.node

      - name: Download WASM artifact
        uses: actions/download-artifact@v4
        with:
          name: wasm
          path: resources/wasm/

      - name: Lint
        if: matrix.target == 'linux-x64'
        run: npm run lint

      - name: Test
        if: matrix.target == 'linux-x64'
        run: xvfb-run -a npm test

      - name: Package VSIX
        run: npx @vscode/vsce package --target ${{ matrix.target }}

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix-${{ matrix.target }}
          path: "*.vsix"

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write

    steps:
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download all VSIX artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: vsix-*
          merge-multiple: true

      - name: List VSIX files
        run: ls -la *.vsix

      - name: Install publish tools
        run: npm install -g @vscode/vsce@3 ovsx@0

      - name: Publish to VS Code Marketplace
        id: vsce
        continue-on-error: true
        run: vsce publish --packagePath *.vsix
        env:
          VSCE_PAT: ${{ secrets.AZURE_PAT }}

      - name: Publish to Open VSX
        id: ovsx
        continue-on-error: true
        run: |
          failed=0
          for vsix in *.vsix; do
            ovsx publish "$vsix" || failed=1
          done
          [ "$failed" -eq 0 ]
        env:
          OVSX_PAT: ${{ secrets.OPEN_VSX_PAT }}

      - name: Create GitHub Release
        if: ${{ !cancelled() }}
        uses: softprops/action-gh-release@v2
        with:
          files: '*.vsix'
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish summary
        if: ${{ !cancelled() }}
        run: |
          echo "## Publish Results" >> "$GITHUB_STEP_SUMMARY"
          echo "| Channel | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| VS Code Marketplace | ${{ steps.vsce.outcome }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Open VSX | ${{ steps.ovsx.outcome }} |" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.vsce.outcome }}" = "failure" ]; then
            echo "::warning::VS Code Marketplace publish failed"
          fi
          if [ "${{ steps.ovsx.outcome }}" = "failure" ]; then
            echo "::warning::Open VSX publish failed"
          fi
