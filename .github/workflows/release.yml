name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 5.0.5

      - name: Verify Emscripten
        run: emcc --version

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Build mrbc WASM
        run: make mrbc

      - name: Verify mrbc WASM output
        run: |
          ls -la resources/wasm/mrbc.js
          ls -la resources/wasm/mrbc.wasm

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasm
          path: resources/wasm/

  build:
    needs: build-wasm
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: darwin-arm64
          - os: macos-13
            target: darwin-x64
          - os: windows-latest
            target: win32-x64
          - os: ubuntu-latest
            target: linux-x64

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify version consistency
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi
          echo "Version: $TAG_VERSION"

      - name: Install dependencies
        run: npm ci

      - name: Verify native binding (macOS)
        if: startsWith(matrix.target, 'darwin-')
        run: |
          echo "Noble native binding:"
          ls -la node_modules/@abandonware/noble/build/Release/binding.node

      - name: Verify native binding (Windows)
        if: startsWith(matrix.target, 'win32-')
        shell: bash
        run: |
          echo "Noble native binding:"
          ls -la node_modules/@abandonware/noble/build/Release/binding.node

      - name: Download WASM artifact
        uses: actions/download-artifact@v4
        with:
          name: wasm
          path: resources/wasm/

      - name: Lint
        if: matrix.target == 'linux-x64'
        run: npm run lint

      - name: Test
        if: matrix.target == 'linux-x64'
        run: xvfb-run -a npm test

      - name: Package VSIX
        run: npx @vscode/vsce package --target ${{ matrix.target }}

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix-${{ matrix.target }}
          path: "*.vsix"

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write

    steps:
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download all VSIX artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: vsix-*
          merge-multiple: true

      - name: List VSIX files
        run: ls -la *.vsix

      - name: Publish to VS Code Marketplace
        id: vsce
        continue-on-error: true
        run: npx @vscode/vsce publish --packagePath $(find . -iname '*.vsix')
        env:
          VSCE_PAT: ${{ secrets.AZURE_PAT }}

      - name: Publish to Open VSX
        id: ovsx
        continue-on-error: true
        run: |
          for vsix in *.vsix; do
            npx ovsx publish "$vsix"
          done
        env:
          OVSX_PAT: ${{ secrets.OPEN_VSX_PAT }}

      - name: Verify publish results
        if: steps.vsce.outcome == 'failure' || steps.ovsx.outcome == 'failure'
        run: |
          echo "::error::One or more publish steps failed"
          [ "${{ steps.vsce.outcome }}" = "failure" ] && echo "::error::VS Code Marketplace publish failed"
          [ "${{ steps.ovsx.outcome }}" = "failure" ] && echo "::error::Open VSX publish failed"
          exit 1

      - name: Create GitHub Release
        if: steps.vsce.outcome == 'success' && steps.ovsx.outcome == 'success'
        uses: softprops/action-gh-release@v2
        with:
          files: '*.vsix'
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
