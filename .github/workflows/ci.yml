name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint + typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Disable CRLF conversion
        run: git config --global core.autocrlf false
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: ESLint
        run: npm run lint
      - name: TypeScript typecheck
        run: npx tsc --noEmit -p .

  build-and-test:
    name: Build & test (${{ matrix.os }})
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Disable CRLF conversion
        run: git config --global core.autocrlf false
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Verify native binding (macOS/Windows)
        if: runner.os != 'Linux'
        shell: bash
        run: |
          echo "Noble native binding:"
          ls -la node_modules/@abandonware/noble/build/Release/binding.node
      - name: Verify native binding (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          echo "bluetooth-hci-socket native binding:"
          ls -la node_modules/@abandonware/bluetooth-hci-socket/build/Release/bluetooth_hci_socket.node
      - name: Build
        run: npm run compile
      - name: Compile tests
        run: npm run compile-tests
      - name: Test (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run -a npx vscode-test
      - name: Test (non-Linux)
        if: runner.os != 'Linux'
        run: npx vscode-test
