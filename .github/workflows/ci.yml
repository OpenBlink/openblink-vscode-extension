name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify native binding (macOS/Windows)
        if: runner.os != 'Linux'
        shell: bash
        run: |
          echo "Noble native binding:"
          ls -la node_modules/@abandonware/noble/build/Release/binding.node

      - name: Verify native binding (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          echo "bluetooth-hci-socket native binding:"
          ls -la node_modules/@abandonware/bluetooth-hci-socket/build/Release/bluetooth_hci_socket.node

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run compile

      - name: Test (Linux)
        run: xvfb-run -a npm test
        if: runner.os == 'Linux'

      - name: Test (non-Linux)
        run: npm test
        if: runner.os != 'Linux'
